# Pinned GraphQL contract for the SDK.
#
# A synthetic model (`Sale`) that exercises the conventions the document builder
# follows, so the framework SDK stays free of any consumer model. It mirrors the
# shapes strawberry-django emits, so a document valid here is valid against a real
# runtime endpoint:
#
#  - standard relay node ids (`id: ID!`) and a `Node` interface;
#  - offset pagination (`totalCount`, `results`, `pageInfo { offset limit }`) read
#    with `pagination: { offset, limit }`, so the client owns "page N of M";
#  - a `@oneOf` order input over an `Ordering` enum, and lookup-object filters;
#  - verb-first `create/update/delete` mutations taking `data:` / a `Patch` (whose
#    id travels inside the patch) / an `id:`, with the cascade `DeletePreview`;
#  - one `<noun>Aggregate(groupBy:)` field returning `{ count, groups }`;
#  - session login (`login`/`logout`/`currentUser`);
#  - a per-model `<noun>Changed` change event.
#
# This file is the source the codegen and the document-builder tests both read.

directive @oneOf on INPUT_OBJECT

scalar DateTime

scalar JSON

"""An object with a Globally Unique ID"""
interface Node {
  """The Globally Unique ID of this object"""
  id: ID!
}

enum SaleState {
  DRAFT
  OPEN
  CLOSED
}

enum Ordering {
  ASC
  ASC_NULLS_FIRST
  ASC_NULLS_LAST
  DESC
  DESC_NULLS_FIRST
  DESC_NULLS_LAST
}

type Sale implements Node {
  id: ID!
  title: String!
  state: SaleState!
  isFeatured: Boolean!
  tags: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SaleOffsetPaginated {
  pageInfo: OffsetPaginationInfo!
  totalCount: Int!
  results: [Sale!]!
}

type OffsetPaginationInfo {
  offset: Int!
  limit: Int
}

input OffsetPaginationInput {
  offset: Int! = 0
  limit: Int
}

input BoolBaseFilterLookup {
  exact: Boolean
  isNull: Boolean
  inList: [Boolean!]
}

input StrFilterLookup {
  exact: String
  isNull: Boolean
  inList: [String!]
  iExact: String
  contains: String
  iContains: String
  startsWith: String
  iStartsWith: String
  endsWith: String
  iEndsWith: String
  regex: String
  iRegex: String
}

input SaleStateFilterLookup {
  exact: SaleState
  isNull: Boolean
  inList: [SaleState!]
}

input SaleFilter {
  state: SaleStateFilterLookup
  isFeatured: BoolBaseFilterLookup
  title: StrFilterLookup
  AND: SaleFilter
  OR: SaleFilter
  NOT: SaleFilter
  DISTINCT: Boolean
}

input SaleOrder @oneOf {
  title: Ordering
  state: Ordering
  createdAt: Ordering
  updatedAt: Ordering
}

input SaleInput {
  title: String!
  state: SaleState! = DRAFT
  isFeatured: Boolean! = false
  tags: [String!]! = []
}

input SalePatch {
  id: ID!
  title: String
  state: SaleState
  isFeatured: Boolean
  tags: [String!]
}

enum SaleGroupBy {
  STATE
  IS_FEATURED
  CREATED_AT_MONTH
}

type SaleGrouped {
  count: Int!
  state: SaleState
  isFeatured: Boolean
  createdAtMonth: DateTime
}

type SaleAggregate {
  count: Int!
  groups: [SaleGrouped!]!
}

type DeletePreviewGroup {
  label: String!
  count: Int!
}

type DeletePreview {
  totalDeletedCount: Int!
  deleted: [DeletePreviewGroup!]!
  updated: [DeletePreviewGroup!]!
  blocked: [DeletePreviewGroup!]!
  hasBlockers: Boolean!
}

type Viewer implements Node {
  id: ID!
  username: String!
  firstName: String!
  lastName: String!
  email: String!
  isStaff: Boolean!
  isActive: Boolean!
}

type LoginPayload {
  ok: Boolean!
  user: Viewer
}

type ChangeEvent {
  model: String!
  id: ID!
  action: String!
  changedFields: [String!]
  changedValues: JSON
}

type Query {
  currentUser: Viewer
  sale(id: ID!): Sale
  sales(
    pagination: OffsetPaginationInput
    filters: SaleFilter
    order: SaleOrder
  ): SaleOffsetPaginated!
  saleAggregate(groupBy: [SaleGroupBy!]): SaleAggregate!
}

type Mutation {
  login(username: String!, password: String!): LoginPayload!
  logout: Boolean!
  createSale(data: SaleInput!): Sale!
  updateSale(data: SalePatch!): Sale!
  deleteSale(id: ID!): DeletePreview!
}

type Subscription {
  saleChanged: ChangeEvent!
}
