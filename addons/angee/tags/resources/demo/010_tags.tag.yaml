# Demo tags (demo tier). These are shared vocabulary readable by every
# authenticated actor; the `shared@auth/user:*` wildcard reader is written by
# Tag.save on load.
# Party assignments are created through the authored `tag` mutation (the polymorphic
# edge is not an ordinary resource insert), so they are not seeded here.
# Idempotency is the resource ledger's (source_addon, xref) identity.
_meta:
  model: tags.Tag
rows:
  - xref: vip
    fields:
      name: VIP
      color: "#c0392b"
  - xref: prospect
    fields:
      name: Prospect
      color: "#2980b9"
  - xref: wholesale
    fields:
      name: Wholesale
      color: "#27ae60"
  - xref: partner
    fields:
      name: Partner
      color: "#8e44ad"
