# Angee addon manifest. The declarative contract hatch-angee compiles into
# the package's [project] + entry points; see angee/addons.py (AddonContract).
[addon]
name = "angee.messaging_integrate_telegram"
description = "Telegram sync — pairs a user account by QR code and pulls chats into messaging"
keywords = ["telegram", "chat", "sync"]
category = "Integration"
depends_on = ["angee.messaging", "angee.integrate", "angee.parties", "angee.workflows_integrate"]

[[migrations]]
name = "broadcast_thread_visibility"
app_label = "messaging"
module = "runtime_migrations.broadcast_thread_visibility"

[resources]
master = [{ path = "resources/master/010_integrate.vendor.yaml", adopt = "slug" }]
