# OIDC refinements (install tier) for the login-capable public OAuth clients that
# `integrate` seeds. Model inferred from the `iam_integrate_oidc.oidcclient`
# filename; each `oauth_client` is a cross-addon reference to an `integrate`
# OAuth-client xref. A provider with a row here can verify an ID token and so can be
# a login provider; the connect-only clients (Anthropic) have none. Login *policy*
# (auto-create, email allow-list) is left at defaults.
- xref: gemini_oidc
  oauth_client: integrate.oauth_gemini
  issuer: https://accounts.google.com
  jwks_uri: https://www.googleapis.com/oauth2/v3/certs
  discovery_url: https://accounts.google.com/.well-known/openid-configuration
- xref: grok_oidc
  oauth_client: integrate.oauth_grok
  issuer: https://auth.x.ai
  discovery_url: https://auth.x.ai/.well-known/openid-configuration
