# Demo IAM directory posture. This grant is data, not schema: loading it makes
# the singleton directory readable to every authenticated user. Narrow
# deployments can omit just this seed with:
# ANGEE_RESOURCE_EXCLUDED_ENTRIES =
#   ("angee.iam:resources/demo/020_iam.directory_wildcard_reader.yaml",)
rows:
  - resource: iam/directory:main
    relation: reader
    subject: auth/user:*
