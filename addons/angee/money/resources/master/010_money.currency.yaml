# ISO-4217 currency catalogue (master tier). `decimal_places` is the minor-unit
# exponent used by Currency.round: 0 for JPY/KRW and the CFA/other zero-minor
# currencies, 3 for the Gulf dinars (BHD/IQD/JOD/KWD/LYD/OMR/TND), else 2
# (MGA/MRU carry ISO exponent 2). `symbol` is best-effort; the plain code stands
# in where a currency has no widely distinct symbol. Idempotency is the resource
# ledger's (source_addon, xref) identity — xref is the lower-cased ISO code.
