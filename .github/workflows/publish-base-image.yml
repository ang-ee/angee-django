name: publish framework images

# Builds and publishes the framework container surface: the dependency base,
# the self-contained Django runtime image, and the matching @angee/* web runtime.
# Tagged to the framework version on release; :edge tracks main.

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/publish-base-image.yml"
  workflow_dispatch:

concurrency:
  group: base-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/ang-ee

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: base
            image: django-angee-base
            target: final
          - id: runtime
            image: django-angee
            target: runtime
          - id: web
            image: angee-web
            target: angee-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            # :latest tracks the default branch so the quickstart (stacks/local
            # defaults to :latest) resolves without needing a tagged release.
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          # No provenance/SBOM attestations — they push extra manifests to ghcr
          # (more surface for a 403), and these quickstart images don't need them.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}
