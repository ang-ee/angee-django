_min_copier_version: "9.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

_angee:
  schema: 1
  kind: project
  name: web
  description: >-
    Vite + React web package for a downstream Angee project. The composed
    runtime graph owns frontend package discovery, Tailwind source scanning, app
    addon/schema wiring, and typed GraphQL operation codegen through
    `runtime/web/*` artifacts emitted by `manage.py angee build`.

# Display title for the rendered SPA (index.html <title>).
project_title:
  type: str
  default: Angee
  help: Human title shown in the browser tab (index.html <title>).

# npm package name for the rendered web package. Scoped to the project so it does
# not collide with framework workspace packages.
package_name:
  type: str
  default: "@app/web"
  help: npm name for the rendered web package (its own private host package).

# Path to the project's web package, relative to the project root — the directory
# this template renders into. Mirrors the `web_path` input the dev stack passes to
# `pnpm --dir <web_path> codegen`, so the codegen ownership lands in one place.
web_path:
  type: str
  default: "web"
  help: Path of the web package relative to the project root (matches the dev stack's web_path).

# The rendered web package reaches the framework's build-config (Vite, Vitest,
# and the tsconfig base) by PACKAGE NAME — `@angee/app/vite`, `@angee/app/vitest`,
# `@angee/app/tsconfig.base.json` — not a sibling path. `@angee/app` is a
# dependency of the web package, so those exports resolve the same way whether the
# framework is an editable checkout or an installed wheel. That is why this
# template no longer takes any `framework_*` path input.

# React major used for the @types/react* devDependencies. Kept as one input so the
# rendered manifest pins a single React line.
react_version:
  type: str
  default: "^19.2.0"
  help: React (and react-dom) version range for the rendered package.
